inputs:
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  rust-overlay:
    url: github:oxalica/rust-overlay
    inputs:
      nixpkgs:
        follows: nixpkgs
  materializer:
    url: git+https://github.com/Alb-O/materializer.git?ref=main
    flake: false
  committer:
    url: git+https://github.com/Alb-O/committer.git?ref=main
    flake: false
imports:
  - materializer
  - committer
